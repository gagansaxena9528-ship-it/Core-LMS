<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Debug script to catch and prevent fetch assignment errors
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: (val) => {
              console.warn('Something tried to overwrite window.fetch! Assignment ignored.', new Error().stack);
            },
            configurable: false // Prevent further redefinition
          });
        } catch (e) {
          console.error('Failed to protect window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
